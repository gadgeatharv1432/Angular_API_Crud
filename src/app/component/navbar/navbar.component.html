<mat-toolbar class="navbar">

  <!-- Search Box - matches PDF design -->
  <div style="
    display: flex; 
    align-items: center; 
    background: #f3f4f6; 
    border-radius: 8px; 
    padding: 6px 14px; 
    gap: 8px;
    min-width: 300px;
  ">
    <mat-icon style="color: #9ca3af; font-size: 18px; width:18px; height:18px;">search</mat-icon>
    <span style="color: #9ca3af; font-size: 14px;">Search tasks, reports, users...</span>
  </div>

  <!-- Spacer -->
  <span class="spacer"></span>

  <!-- Right Section: Bell + User -->
  <div class="navbar-right">

    <!-- Notification Bell -->
    <button mat-icon-button>
      <mat-icon style="color: #6b7280;">notifications_none</mat-icon>
    </button>

    <!-- User Info + Menu -->
    <div class="user-info" [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{ userName }}</span>
      <span class="user-role-badge">{{ userRole }}</span>
      <mat-icon style="color: #9ca3af; font-size: 16px;">arrow_drop_down</mat-icon>
    </div>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

  </div>

</mat-toolbar>
