<mat-toolbar class="navbar">

  <!-- Search Box — visual element matching PDF -->
  <div style="
    display: flex;
    align-items: center;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 7px 14px;
    gap: 8px;
    min-width: 280px;
    cursor: text;
  ">
    <mat-icon style="color:#9ca3af; font-size:17px; width:17px; height:17px; line-height:17px;">
      search
    </mat-icon>
    <span style="color:#9ca3af; font-size:13px; user-select:none;">
      Search tasks, reports, users...
    </span>
  </div>

  <!-- Spacer — pushes right items to the edge -->
  <span class="spacer"></span>

  <!-- Right side controls -->
  <div class="navbar-right">

    <!-- Notification Bell -->
    <button mat-icon-button style="color: #6b7280;">
      <mat-icon>notifications_none</mat-icon>
    </button>

    <!-- User info + dropdown menu -->
    <div class="user-info" [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{ userName }}</span>
      <span class="user-role-badge">{{ userRole }}</span>
      <mat-icon style="color:#9ca3af; font-size:18px; width:18px; height:18px;">
        expand_more
      </mat-icon>
    </div>

    <!-- Dropdown menu -->
    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

  </div>

</mat-toolbar>
