<mat-toolbar class="navbar">

  <!-- Search Box — visual placeholder -->
  <div class="search-box">
    <mat-icon class="search-icon">search</mat-icon>
    <span class="search-placeholder">Search tasks, reports, users...</span>
  </div>

  <span class="spacer"></span>

  <div class="navbar-right">

    <!-- User Avatar + Info + Dropdown -->
    <div class="user-trigger" [matMenuTriggerFor]="userMenu">
      <!-- Photo avatar (when photo exists) -->
      <img
        *ngIf="currentPhoto; else initialAvatar"
        [src]="currentPhoto"
        alt="Profile"
        class="nav-avatar-img">

      <!-- Initial letter avatar (fallback) -->
      <ng-template #initialAvatar>
        <div class="nav-avatar-circle">
          <span>{{ avatarInitial }}</span>
        </div>
      </ng-template>

      <div class="user-text">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
      <mat-icon class="chevron-icon">expand_more</mat-icon>
    </div>

    <!-- Dropdown Menu -->
    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person_outline</mat-icon>
        <span>Profile Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

  </div>

</mat-toolbar>
