<nav class="sidebar">

  <!-- Brand Section - like PDF shows "Enterprise" at top -->
  <div class="sidebar-brand">
    <div class="brand-logo">E</div>
    <p class="brand-name">Enterprise</p>
    <p class="brand-sub">Task Management</p>
  </div>

  <mat-nav-list>

    <!-- Dashboard — only for Admin role -->
    <a mat-list-item
      *ngIf="userRole === 'Admin'"
      routerLink="/dashboard"
      routerLinkActive="active-link">
      <mat-icon matListItemIcon>dashboard</mat-icon>
      <span matListItemTitle>Dashboard</span>
    </a>

    <!-- Tasks — visible to everyone -->
    <a mat-list-item
      routerLink="/task"
      routerLinkActive="active-link">
      <mat-icon matListItemIcon>check_box</mat-icon>
      <span matListItemTitle>Tasks</span>
    </a>

  </mat-nav-list>

</nav>
