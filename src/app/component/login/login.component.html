<div class="login-container">
  <mat-card class="login-card" appearance="outlined">

    <!-- Logo Box — blue rounded square like PDF -->
    <div class="logo-box">
      <span>TF</span>
    </div>

    <!-- Title & Subtitle -->
    <h1 class="login-title">TaskFlow Pro</h1>
    <p class="login-subtitle">Sign in to access your workspace</p>

    <!-- Form -->
    <form #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off">

      <!-- Email Field -->
      <div class="field-label">Email Address</div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-icon matPrefix class="field-icon">mail_outline</mat-icon>
        <input
          matInput
          type="email"
          name="email"
          placeholder="admin@company.com"
          required
          email
          #emailRef="ngModel"
          [(ngModel)]="loginObj.Email">
        <!-- Error shown only after user touches the field -->
        <mat-error *ngIf="emailRef.invalid && emailRef.touched">
          Valid email format is required.
        </mat-error>
      </mat-form-field>

      <!-- Password Field — label row has "Forgot password?" on right -->
      <div class="field-label-row">
        <span class="field-label">Password</span>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-icon matPrefix class="field-icon">lock_outline</mat-icon>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          name="password"
          required
          minlength="6"
          #passwordRef="ngModel"
          [(ngModel)]="loginObj.Password">
        <!-- Toggle password visibility -->
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="passwordRef.invalid && passwordRef.touched">
          Password must be at least 6 characters.
        </mat-error>
      </mat-form-field>

      <!-- Sign In Button — full width, blue, with arrow like PDF -->
      <button
        mat-raised-button
        class="signin-btn"
        type="submit"
        [disabled]="loginForm.invalid || isLoading">

        <!-- Spinner while loading -->
        <mat-spinner
          *ngIf="isLoading"
          diameter="18"
          class="btn-spinner">
        </mat-spinner>

        <span *ngIf="!isLoading">Sign In &nbsp;→</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>

    </form>

    <!-- Bottom Text -->
    <p class="bottom-text">
      Don't have an account?
      <a href="#" class="contact-link">Contact Administrator</a>
    </p>

  </mat-card>
</div>
